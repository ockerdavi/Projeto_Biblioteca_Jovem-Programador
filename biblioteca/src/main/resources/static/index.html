<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Biblioteca</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <main class="container">
        <div class="title-container">
            <h1>Dashboard Biblioteca</h1>
            <span class="badge">Acervo - 312 títulos</span>
        </div>

        <section class="card">
            <h2>Cadastrar Livro</h2>
            <form class="form-grid">
                <div class="input-group full-width">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" placeholder="Título">
                </div>
                
                <div class="input-group">
                    <label for="isbn">ISBN</label>
                    <input type="text" id="isbn" placeholder="ISBN">
                </div>
                
                <div class="input-group">
                    <label for="autor">Autor</label>
                    <input type="text" id="autor" placeholder="Autor">
                </div>
                
                <div class="input-group">
                    <label for="categoria">Categoria</label>
                    <input type="text" id="categoria" placeholder="Categoria">
                </div>
                
                <div class="input-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" id="quantidade" placeholder="Quantidade">
                </div>

                <div class="button-container full-width">
                    <button type="submit" class="btn-save">Salvar</button>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Livros</h2>
            <div class="table-container">
                <table class="books-table">
                    <thead>
                        <tr>
                            <th class="text-center">ID</th>
                            <th class="text-left">TÍTULO</th>
                            <th class="text-center">DISPONÍVEIS</th>
                            <th class="text-center">ALUGADOS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="text-center">01</td>
                            <td class="text-left font-serif">Dom Casmurro</td>
                            <td class="text-center bold">8</td>
                            <td class="text-center bold">2</td>
                        </tr>
                        <tr>
                            <td class="text-center">02</td>
                            <td class="text-left font-serif">Grande Sertão: Veredas</td>
                            <td class="text-center bold">5</td>
                            <td class="text-center bold">4</td>
                        </tr>
                        <tr>
                            <td class="text-center">03</td>
                            <td class="text-left font-serif">A Hora da Estrela</td>
                            <td class="text-center bold">11</td>
                            <td class="text-center bold">1</td>
                        </tr>
                        <tr>
                            <td class="text-center">04</td>
                            <td class="text-left font-serif">Memórias Póstumas</td>
                            <td class="text-center bold">6</td>
                            <td class="text-center bold">3</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

</body>
</html>
